<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Varun JP - Portfolio</title>

    <!-- ✨ CRITICAL: Font preloading with display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300;500;700&display=swap" 
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link 
        rel="stylesheet" 
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300;500;700&display=swap"
      />
    </noscript>

    <!-- ✨ NEW: Preload GSAP for faster first paint -->
    <link 
      rel="modulepreload" 
      href="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
    />
    <link 
      rel="modulepreload" 
      href="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"
    />

    <!-- CRITICAL: Preconnect to domains -->
    <link rel="preconnect" href="https://prod.spline.design" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

    <!-- PRIORITY 1: Preload Spline viewer script -->
    <link 
      rel="modulepreload" 
      href="https://unpkg.com/@splinetool/viewer@1.10.76/build/spline-viewer.js"
    />

    <!-- PRIORITY 2: Prefetch the scene data -->
    <link
      rel="prefetch"
      href="https://prod.spline.design/j21MmjPRjldcdvoM/scene.splinecode"
      crossorigin
    />

    <!-- Load Spline viewer script -->
    <script 
      type="module" 
      src="https://unpkg.com/@splinetool/viewer@1.10.76/build/spline-viewer.js"
      async
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
