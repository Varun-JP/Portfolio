<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Image Slider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        nav, footer {
            position: fixed;
            left: 0;
            width: 100vw;
            padding: 2.75em;
            display: flex;
            justify-content: space-between;
            z-index: 2;
        }

        nav {
            top: 0;
        }

        footer {
            bottom: 0;
        }

        a {
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 500;
            color: #000;
        }

        nav a#logo {
            position: relative;
            top: -12px;
            font-family: 'Georgia', serif;
            font-size: 42px;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgb(213, 183, 71);
            filter: brightness(0.75);
            opacity: 0.5;
        }

        .slider-nav {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 25%;
            height: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .nav-item-wrapper {
            flex: 1;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 750ms cubic-bezier(0, 0.75, 0.5, 1);
            cursor: pointer;
        }

        .nav-item {
            width: 1px;
            height: 100%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            transition: all 750ms cubic-bezier(0, 0.75, 0.5, 1);
        }

        .nav-item-wrapper.active {
            flex: 1.5;
        }

        .nav-item-wrapper.active .nav-item {
            width: 50%;
            border: 1px solid rgba(0, 0, 0, 0.4);
        }

        .slides {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        .slide {
            flex-shrink: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide .img {
            width: 50%;
            height: 50%;
            opacity: 0.75;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            border-radius: 10px;
        }

        .slide-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            height: 65%;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .slide-title-row {
            flex: 1;
            width: 100%;
            display: flex;
        }

        .slide-title-row:nth-child(2) {
            position: relative;
            left: 4em;
        }

        .letter {
            flex: 1;
            height: 100%;
            padding-left: 2em;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
            overflow: hidden;
        }

        .letter span {
            position: relative;
            display: inline-block;
            font-family: 'Georgia', serif;
            font-size: 180px;
            font-weight: bold;
            filter: brightness(0.25) saturate(0.75);
            line-height: 1;
        }

        @media (max-width: 900px) {
            .slider-nav {
                width: 40%;
            }

            .slide .img {
                width: 80%;
                height: 75%;
            }

            .slide-title {
                left: 47.5%;
                height: 25%;
            }

            .slide-title-row:nth-child(2) {
                left: 0;
            }

            .letter span {
                font-size: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="#" id="logo">Varun</a>
            <a href="#">Subscribe</a>
        </nav>
        <footer>
            <a href="#">Unlock Source code</a>
            <a href="#">Link in Description</a>
        </footer>
        <div class="bg-overlay"></div>
        <div class="slider-nav"></div>
        <div class="slides"></div>
        <div class="slide-title">
            <div class="slide-title-row"></div>
            <div class="slide-title-row"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>
    <script>
        const titles = [
            [["A","R","I","S","T","I","D","E"], ["B","R","A","N","D"," ","I","D"]],
            [["C","A","N","A","L","S"], ["U","R","B","A","N"," ","P","H","O","T","O"]],
            [["M","A","N","K"], ["F","I","L","M"," ","W","O","R","K"]],
            [["N","E","X","U","S"], ["D","I","G","I","T","A","L"," ","A","R","T"]],
            [["V","O","I","D"], ["V","I","S","U","A","L"," ","A","R","T"]],
            [["P","U","L","S","E"], ["M","O","T","I","O","N"," ","G","F","X"]],
            [["E","C","H","O"], ["S","O","U","N","D"," ","D","E","S","I","G","N"]],
            [["Z","E","N","I","T","H"], ["A","R","C","H","I","T","E","C","T","U","R","E"]],
            [["P","R","I","S","M"], ["C","R","E","A","T","I","V","E"," ","L","A","B"]],
            [["A","U","R","O","R","A"], ["L","I","G","H","T"," ","S","T","U","D","I","O"]],
            [["V","E","R","T","E","X"], ["3","D"," ","M","O","D","E","L","I","N","G"]],
            [["F","L","U","X"], ["I","N","T","E","R","A","C","T","I","V","E"]],
            [["P","I","X","E","L"], ["G","A","M","E"," ","D","E","S","I","G","N"]],
            [["O","R","B","I","T"], ["S","P","A","C","E"," ","A","R","T"]],
            [["M","Y","T","H","O","S"], ["S","T","O","R","Y"," ","T","E","L","L","I","N","G"]],
            [["C","H","R","O","M","A"], ["C","O","L","O","R"," ","T","H","E","O","R","Y"]],
            [["S","P","E","C","T","R","A"], ["V","I","S","U","A","L"," ","F","X"]],
            [["Q","U","A","N","T","A"], ["D","A","T","A"," ","V","I","Z"]],
            [["N","O","V","A"], ["B","R","A","N","D"," ","S","T","U","D","I","O"]],
            [["K","I","N","E","T","I","C"], ["T","Y","P","O","G","R","A","P","H","Y"]],
            [["L","U","M","E","N"], ["P","H","O","T","O","G","R","A","P","H","Y"]],
            [["E","T","H","O","S"], ["E","D","I","T","O","R","I","A","L"]],
            [["R","H","Y","T","H","M"], ["M","U","S","I","C"," ","V","I","D","E","O"]],
            [["A","X","I","S"], ["P","R","O","D","U","C","T"," ","D","E","S","I","G","N"]],
            [["S","O","L","A","R"], ["E","N","V","I","R","O","N","M","E","N","T"]],
            [["M","A","T","R","I","X"], ["C","O","D","E"," ","A","R","T"]],
            [["Z","E","P","H","Y","R"], ["W","I","N","D"," ","S","C","U","L","P","T","U","R","E"]],
            [["C","O","S","M","O","S"], ["U","N","I","V","E","R","S","E"," ","A","R","T"]],
            [["P","H","O","E","N","I","X"], ["R","E","B","R","A","N","D"," ","S","T","U","D","I","O"]]
        ];

        gsap.registerPlugin(CustomEase);
        CustomEase.create("hop", "M0,0 C0.071,0.505 0.192,0.726 0.318,0.852 0.45,0.984 0.504,1 1,1");

        const sliderNav = document.querySelector(".slider-nav");
        const sliderContainer = document.querySelector(".slides");
        const bgOverlay = document.querySelector(".bg-overlay");
        const slideTitle = document.querySelector(".slide-title");
        const numberOfItems = titles.length;
        let currentIndex = 0;

        function getRandomColor() {
            const letters = "0123456789ABCDEF";
            let color = "#";
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function updateTitle(newIndex, color) {
            const title = titles[newIndex];
            const titleRows = slideTitle.querySelectorAll(".slide-title-row");

            titleRows.forEach((row, rowIndex) => {
                row.innerHTML = '';
                const maxLength = Math.max(title[0].length, title[1].length);

                for (let i = 0; i < maxLength; i++) {
                    const letterDiv = document.createElement("div");
                    letterDiv.classList.add("letter");
                    row.appendChild(letterDiv);
                }

                row.querySelectorAll(".letter").forEach((letter, letterIndex) => {
                    const newSpan = document.createElement("span");
                    const direction = newIndex > currentIndex ? 150 : -150;

                    gsap.set(newSpan, { x: direction, color: color });
                    newSpan.textContent = title[rowIndex][letterIndex] || "";
                    letter.appendChild(newSpan);

                    gsap.to(newSpan, {
                        x: 0,
                        duration: 1,
                        ease: "hop",
                        delay: letterIndex * 0.05,
                    });
                });
            });
        }

        for (let i = 0; i < numberOfItems; i++) {
            // Nav item
            const navItemWrapper = document.createElement("div");
            navItemWrapper.classList.add("nav-item-wrapper");
            if (i === 0) navItemWrapper.classList.add("active");

            const navItem = document.createElement("div");
            navItem.classList.add("nav-item");
            navItemWrapper.appendChild(navItem);
            sliderNav.appendChild(navItemWrapper);

            navItemWrapper.addEventListener("click", () => {
                if (i === currentIndex) return;

                document.querySelectorAll(".nav-item-wrapper").forEach(nav => nav.classList.remove("active"));
                navItemWrapper.classList.add("active");

                gsap.to(sliderContainer, {
                    x: `${-i * 100}vw`,
                    duration: 1.5,
                    ease: "hop",
                });

                const newColor = getRandomColor();
                gsap.to(bgOverlay, {
                    backgroundColor: newColor,
                    duration: 1.5,
                    ease: "hop",
                });

                updateTitle(i, newColor);
                currentIndex = i;
            });

            // Slide
            const slide = document.createElement("div");
            slide.classList.add("slide");

            const imgWrapper = document.createElement("div");
            imgWrapper.classList.add("img");
            imgWrapper.textContent = `Slide ${i + 1}`;

            slide.appendChild(imgWrapper);
            sliderContainer.appendChild(slide);
        }

        updateTitle(0, getComputedStyle(bgOverlay).backgroundColor);
    </script>
</body>
</html>
